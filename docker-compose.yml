services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - pizza_db:/data/db
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Optional: Litestream SQLite Backup Sidecar
  # Aktivieren mit: docker compose --profile backup up -d
  # Benötigt .env-Variablen aus .env.example (LITESTREAM_*).
  litestream:
    image: litestream/litestream:0.3.13
    profiles: ["backup"]
    restart: unless-stopped
    depends_on:
      - app
    env_file:
      - .env
    volumes:
      - pizza_db:/data/db
      - ./litestream.yml:/etc/litestream.yml:ro
    command: ["replicate", "-config", "/etc/litestream.yml"]
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  pizza_db:
    name: pizza_db
